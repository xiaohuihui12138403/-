<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>产品详情</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="selected-detail-page">
  <!-- 左上角返回按钮：从产品详情页返回产品列表页 -->
  <a class="back-button list-back" href="products.html">返回</a>

  <header class="product-list-hero detail-top-hero">
    <img class="product-hero-bg" src="../images/首页背景.jpg.png" alt="">
    <div class="product-hero-overlay"></div>
    <div class="product-hero-brand">
      <div class="product-brand-main">
        <span>CSOP</span>
        <small>Asset Management</small>
      </div>
      <i></i>
      <strong>南方东英<br>资产管理</strong>
    </div>
    <p class="product-hero-tagline">————香港最大的ETF发行商</p>
  </header>

  <main class="selected-products-page">
    <section class="detail-market-stats" aria-label="南方东英市场占有率图表">
      <div class="detail-market-title">
        <h2>在香港杠杆及反向产品市场上（2026Q1）</h2>
        <p>南方东英市占率独占鳌头</p>
      </div>

      <div class="detail-market-grid">
        <div class="detail-market-block">
          <h3>按日均成交额（ADT）</h3>
          <div class="donut donut-adt" role="img" aria-label="按日均成交额，南方东英占比99.7%，其他发行商占比0.3%">
            <svg class="detail-donut-svg" viewBox="0 0 128 128" aria-hidden="true">
              <circle class="detail-donut-base" cx="64" cy="64" r="46" pathLength="100"></circle>
              <circle class="detail-donut-value" cx="64" cy="64" r="46" pathLength="100" stroke-dasharray="99.7 100"></circle>
              <circle class="detail-donut-hole" cx="64" cy="64" r="30"></circle>
            </svg>
            <span>99.7%</span>
            <small>0.3%</small>
            <strong>ADT<br>No.1</strong>
          </div>
          <ul class="legend">
            <li><i class="blue"></i>南方东英</li>
            <li><i class="light"></i>其他发行商</li>
          </ul>
        </div>

        <div class="detail-market-divider"></div>

        <div class="detail-market-block">
          <h3>按资产规模管理（AUM）</h3>
          <div class="donut donut-aum" role="img" aria-label="按资产规模管理，南方东英占比99.1%，其他发行商占比0.9%">
            <svg class="detail-donut-svg" viewBox="0 0 128 128" aria-hidden="true">
              <circle class="detail-donut-base" cx="64" cy="64" r="46" pathLength="100"></circle>
              <circle class="detail-donut-value" cx="64" cy="64" r="46" pathLength="100" stroke-dasharray="99.1 100"></circle>
              <circle class="detail-donut-hole" cx="64" cy="64" r="30"></circle>
            </svg>
            <span>99.1%</span>
            <small>0.9%</small>
            <strong>AUM<br>No.1</strong>
          </div>
          <ul class="legend">
            <li><i class="blue"></i>南方东英</li>
            <li><i class="light"></i>其他发行商</li>
          </ul>
        </div>
      </div>
    </section>

    <section class="selected-products-title">
      <h1>部分产品 <span>（共 <strong data-detail-count>0</strong> 个）</span></h1>
      <!-- <p>以下为您选择的产品及亮点介绍</p>-->
    </section>

    <section class="selected-products-grid" data-selected-products></section>

    <div class="pdf-export-action">
      <button class="pdf-export-button" type="button" data-export-pdf>导出为PDF</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
